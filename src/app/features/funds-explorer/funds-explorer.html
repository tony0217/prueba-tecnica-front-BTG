<div class="layout-container">
  <app-sidebar></app-sidebar>
  
  <main class="page-content">
    <!-- Desktop Header -->
    <header class="page-header desktop-header">
      <div class="header-titles">
        <h1>Explorador de Fondos</h1>
        <p>Descubre oportunidades y fondos administrados por expertos.</p>
      </div>

      <div class="filter-tabs">
        <button [class.active]="activeFilter === 'ALL'" (click)="applyFilter('ALL')">Todos los Fondos</button>
        <button [class.active]="activeFilter === 'FPV'" (click)="applyFilter('FPV')">Voluntaria (FPV)</button>
        <button [class.active]="activeFilter === 'FIC'" (click)="applyFilter('FIC')">Inversión (FIC)</button>
      </div>
    </header>

    <!-- Mobile Header -->
    <header class="mobile-header">
      <div class="mobile-top-bar">
        <a routerLink="/" class="back-btn">
          <mat-icon>arrow_back</mat-icon>
        </a>
        <h1>Explorador de Fondos</h1>
        <button class="notif-btn">
          <mat-icon>notifications</mat-icon>
        </button>
      </div>

      <!-- Mobile Filter Chips -->
      <div class="mobile-filter-chips">
        <button [class.active]="activeFilter === 'ALL'" (click)="applyFilter('ALL')">
          <span>Todos</span>
        </button>
        <button [class.active]="activeFilter === 'FPV'" (click)="applyFilter('FPV')">
          <span>Voluntaria (FPV)</span>
        </button>
        <button [class.active]="activeFilter === 'FIC'" (click)="applyFilter('FIC')">
          <span>Inversión (FIC)</span>
        </button>
      </div>
    </header>

    <div class="grid-container">
      <div class="funds-grid">
        <app-fund-card 
          *ngFor="let fund of filteredFunds" 
          [fund]="fund"
          (actionClick)="openSubscriptionDialog($event)">
        </app-fund-card>
      </div>
    </div>

    <!-- Mobile Bottom Nav -->
    <nav class="bottom-nav">
      <a routerLink="/" class="nav-item">
        <mat-icon>dashboard</mat-icon>
        <span>Dashboard</span>
      </a>
      <a routerLink="/funds-explorer" routerLinkActive="active" class="nav-item">
        <mat-icon>explore</mat-icon>
        <span>Fondos</span>
      </a>
      <a routerLink="/my-investments" class="nav-item">
        <mat-icon>analytics</mat-icon>
        <span>Invertir</span>
      </a>
      <a routerLink="/transaction-history" class="nav-item">
        <mat-icon>history</mat-icon>
        <span>Historial</span>
      </a>
    </nav>
  </main>
</div>
